<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Ayudantía InfoVis</title>
        <link href="style.css" rel="stylesheet"/>

    </head>

    <body>

        <div>

            <h2 class="subtitulo">Ejemplo de texto</h2>

            <h1>Hola Mundo</h1>
            <h2>Hola Chile</h2>
            <h3>Hola Santiago</h3>
            <p>Hola San Joaquín</p>

        </div>

        <div id="imagen">
            <h2 class="subtitulo">Ejemplo imagen</h2>

            <img src="kirby.jpg" alt="imagen de kirby">

        </div>

        <div>
            <h2 class="subtitulo">Ejemplo inputs</h2>

            <div id="fila-inputs">

                <div>
                    <h3>Texto</h3>
                    <input type="text">
                </div>

                <div>
                    <h3>Botones de opción</h3>
                    <input type="radio" value="HTML"> HTML <br>
                    <input type="radio" value="CSS"> CSS <br>
                    <input type="radio" value="JavaScript"> JavaScript <br>
                </div>

                <div>
                    <h3>Botones</h3>
                    <input type="submit" value="soy un botón">
                </div>

            </div>

        </div>

        

        



    </body>

</html>
