<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dependencia ofensiva</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body style="font-family: Arial; text-align: center; margin: 0;">

<h2 style="margin-bottom: 5px;">¿Qué equipos dependen más de su goleador?</h2>

<p style="color: gray; margin-top: 0;">
  Datos correspondientes a la Premier League temporada 2025–2026
</p>

<p style="font-size: 12px; color: gray;">
  El tamaño de las pelotas representa los goles totales del equipo
</p>

<div id="chart" style="width:1100px;height:600px;margin:auto;"></div>

<script>

var data = [
  {Equipo:"Arsenal ", dep:19, total:57},
  {Equipo:"Aston Villa ", dep:23, total:40},
  {Equipo:"Bournemouth ", dep:25, total:36},
  {Equipo:"Brentford ", dep:42, total:45},
  {Equipo:"Brighton ", dep:30, total:40},
  {Equipo:"Burnley ", dep:27, total:30},
  {Equipo:"Chelsea ", dep:27, total:52},
  {Equipo:"Crystal Palace ", dep:24, total:33},
  {Equipo:"Everton ", dep:17, total:35},
  {Equipo:"Fulham ", dep:26, total:39},
  {Equipo:"Leeds ", dep:27, total:37},
  {Equipo:"Liverpool ", dep:23, total:48},
  {Equipo:"Manchester City ", dep:32, total:69},
  {Equipo:"Manchester United ", dep:17, total:53},
  {Equipo:"Newcastle ", dep:20, total:44},
  {Equipo:"Nottingham Forest ", dep:29, total:31},
  {Equipo:"Sunderland ", dep:21, total:29},
  {Equipo:"Tottenham ", dep:24, total:37},
  {Equipo:"West Ham ", dep:24, total:34},
  {Equipo:"Wolverhampton ", dep:14, total:22}
];

// ordenar
data.sort(function(a,b){
  return b.total - a.total;
});

var equipos = [];
var dependencia = [];
var sizes = [];
var colors = [];

for (var i = 0; i < data.length; i++) {
  equipos.push(data[i].Equipo);
  dependencia.push(data[i].dep);
  sizes.push(data[i].total / 2);

  if (data[i].dep >= 35) {
    colors.push("red");
  } else if (data[i].dep >= 30) {
    colors.push("orange");
  } else {
    colors.push("blue");
  }
}

var trace = {
  x: dependencia,
  y: equipos,
  mode: "markers",
  type: "scatter",
  marker: {
    size: sizes,
    color: colors
  }
};

var layout = {
  xaxis: {
    title: "Dependencia (%)",
    range: [0,50]
  },
  yaxis: {
    autorange: "reversed"
  },
  margin: {
    l: 180,
    t: 10
  },
  shapes: [
    {
      type: "line",
      x0: 25,
      x1: 25,
      y0: -1,
      y1: data.length,
      line: {
        dash: "dash",
        color: "gray"
      }
    }
  ]
};

Plotly.newPlot("chart", [trace], layout, {
  displayModeBar: false,
  staticPlot: true
});

</script>

</body>
</html>
